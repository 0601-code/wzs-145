server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: farmgear-core
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:farmgear}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123456}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.farmgear.core.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: farmgear-secret-key-for-jwt-token-generation-2024
  expiration: 86400000

logging:
  level:
    com.farmgear.core: debug
